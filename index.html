<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-PICS 認定試験ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --orange: #E8A020;
  --orange-light: #F5B84A;
  --orange-dark: #B87A10;
  --orange-bg: rgba(232,160,32,0.08);
  --black: #0C0C0C;
  --dark: #141414;
  --card: #1A1A1A;
  --border: #2A2A2A;
  --border-light: #333;
  --text: #F0F0F0;
  --text-muted: #888;
  --text-dim: #555;
  --pass: #3DD68C;
  --pass-bg: rgba(61,214,140,0.1);
  --pass-border: rgba(61,214,140,0.3);
  --keep: #F06060;
  --keep-bg: rgba(240,96,96,0.1);
  --keep-border: rgba(240,96,96,0.3);
  --pending-bg: rgba(232,160,32,0.12);
  --pending-border: rgba(232,160,32,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;overflow-x:hidden;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
.page{display:none;}.page.active{display:block;}

/* NAV */
.nav{background:var(--dark);border-bottom:2px solid var(--orange);position:sticky;top:0;z-index:100;padding:0 16px;}
.nav-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.nav-logo{height:32px;width:auto;}
.nav-title{font-family:"Bebas Neue",sans-serif;font-size:19px;letter-spacing:.06em;flex:1;}
.nav-tab{padding:6px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;background:transparent;color:var(--text-muted);}
.nav-tab.active{background:var(--orange);color:var(--black);border-color:var(--orange);}
.nav-tab:hover:not(.active){border-color:var(--border-light);color:var(--text);}

/* BANNER */
.banner{background:var(--dark);border-bottom:1px solid var(--border);padding:10px 16px;}
.banner-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.cd-days{font-family:"Bebas Neue",sans-serif;font-size:40px;color:var(--orange);line-height:1;}
.prog-track{flex:1;min-width:160px;max-width:300px;background:var(--border);border-radius:2px;height:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--orange-dark),var(--orange-light));border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1);}

.main{max-width:800px;margin:0 auto;padding:16px 16px 120px;}

/* DOMAIN CARD */
.domain-card{background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.domain-card.completed{border-color:var(--pass);box-shadow:0 0 0 1px rgba(61,214,140,.12);}
.domain-header{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s;}
.domain-header:hover{background:rgba(255,255,255,.02);}
.domain-num{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--orange);line-height:1;min-width:34px;}
.domain-info{flex:1;min-width:0;}
.domain-name{font-size:15px;font-weight:700;}
.domain-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.domain-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.chevron{transition:transform .25s;color:var(--text-dim);flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.domain-body{display:none;border-top:1px solid var(--border);}
.domain-body.open{display:block;}

/* SEMINAR */
.sem-btn{padding:7px 12px;font-size:12px;font-weight:600;border:1px solid var(--border-light);border-radius:2px;background:var(--dark);color:var(--text-muted);cursor:pointer;transition:all .15s;font-family:"Noto Sans JP",sans-serif;}
.sem-btn:hover{border-color:var(--orange);color:var(--orange);}
.sem-btn.selected{background:var(--orange);border-color:var(--orange);color:var(--black);font-weight:700;}

/* SEC LABEL */
.sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.sec-label::after{content:"";flex:1;height:1px;background:var(--border);}

/* FIELD */
.field{background:var(--dark);border:1px solid var(--border-light);border-radius:2px;color:var(--text);padding:7px 11px;font-size:13px;width:100%;font-family:"Noto Sans JP",sans-serif;outline:none;transition:border-color .15s;}
.field:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,160,32,.1);}
.field::placeholder{color:var(--text-dim);}

/* SUBJECT TABS */
.subject-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.subject-tab{padding:6px 14px;font-size:12px;font-weight:700;border-radius:2px;cursor:pointer;border:1px solid var(--border-light);background:var(--dark);color:var(--text-muted);transition:all .15s;white-space:nowrap;}
.subject-tab:hover{border-color:var(--orange);color:var(--orange);}
.subject-tab.active{background:var(--orange);border-color:var(--orange);color:var(--black);}
.subject-tab.complete{border-color:var(--pass);color:var(--pass);background:var(--pass-bg);}
.subject-tab.active.complete{background:var(--pass);color:var(--black);}
.subject-panel{display:none;}.subject-panel.active{display:block;}

/* IMAGE CARD */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.img-card{background:var(--dark);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;}
.img-top{position:relative;aspect-ratio:4/3;background:var(--black);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
.img-top:hover .upload-hint{opacity:1;}
.upload-hint{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;opacity:0;transition:opacity .15s;pointer-events:none;}
.upload-hint span{font-size:10px;color:var(--orange);}
.img-preview{width:100%;height:100%;object-fit:cover;display:none;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;text-align:center;}
.img-ph-icon{font-size:24px;opacity:.35;}
.img-ph-text{font-size:10px;color:var(--text-dim);line-height:1.4;}
.file-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-bottom{padding:7px;display:flex;flex-direction:column;gap:4px;}
.img-label{font-size:11px;font-weight:700;line-height:1.3;}

/* STATUS BADGE */
.sbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.04em;font-family:"JetBrains Mono",monospace;}
.s-un{background:var(--border);color:var(--text-muted);border:1px solid var(--border-light);}
.s-pe{background:var(--pending-bg);color:var(--orange-light);border:1px solid var(--pending-border);}
.s-pa{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border);}
.s-ke{background:var(--keep-bg);color:var(--keep);border:1px solid var(--keep-border);}

.feedback{font-size:11px;color:var(--text-muted);border-left:2px solid var(--border-light);padding:3px 7px;font-style:italic;background:var(--black);border-radius:0 2px 2px 0;}
.feedback.pa{border-left-color:var(--pass);color:var(--pass);}
.feedback.ke{border-left-color:var(--keep);color:var(--keep);}
.ref-btn{font-size:9px;background:var(--orange-bg);border:1px solid var(--pending-border);color:var(--orange);padding:2px 6px;border-radius:2px;cursor:pointer;font-weight:700;white-space:nowrap;}

/* MINI STATUS */
.done-badge{display:inline-flex;align-items:center;gap:3px;background:var(--pass-bg);border:1px solid var(--pass-border);color:var(--pass);font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;}
.tag{display:inline-block;background:var(--border);border:1px solid var(--border-light);color:var(--text-muted);font-size:10px;font-family:"JetBrains Mono",monospace;padding:2px 6px;border-radius:2px;}
.subj-dot{width:6px;height:6px;border-radius:50%;background:var(--border-light);}
.subj-dot.pa{background:var(--pass);}
.subj-dot.ke{background:var(--keep);}
.subj-dot.pe{background:var(--orange);}

/* ENTRY */
.entry-btn{width:100%;padding:17px;font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.1em;border:none;border-radius:3px;cursor:pointer;transition:all .2s;}
.entry-btn:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;}
.entry-btn:not(:disabled){background:var(--orange);color:var(--black);}
.entry-btn:not(:disabled):hover{background:var(--orange-light);transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,160,32,.3);}

/* POPUP */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--dark);border:1px solid var(--orange);border-radius:4px;padding:22px;max-width:460px;width:100%;max-height:80vh;overflow-y:auto;}
.popup-close{background:var(--card);border:1px solid var(--border-light);color:var(--text-muted);padding:4px 10px;border-radius:2px;cursor:pointer;font-size:12px;}

/* REVIEWER */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:13px;cursor:pointer;transition:border-color .15s;}
.member-card:hover{border-color:var(--orange);box-shadow:0 0 0 1px rgba(232,160,32,.15);}
.rev-img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;}
.rev-img-card{background:var(--card);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.rev-img-top{aspect-ratio:4/3;background:var(--black);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.rev-img-top img{width:100%;height:100%;object-fit:cover;}
.rev-img-bottom{padding:7px;display:flex;flex-direction:column;gap:5px;}
.rev-actions{display:flex;gap:4px;}
.rev-btn{padding:5px 9px;font-size:11px;font-weight:700;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;font-family:"Noto Sans JP",sans-serif;}
.rev-pass{background:var(--pass-bg);border-color:var(--pass-border);color:var(--pass);}
.rev-pass:hover{background:var(--pass);color:var(--black);}
.rev-keep{background:var(--keep-bg);border-color:var(--keep-border);color:var(--keep);}
.rev-keep:hover{background:var(--keep);color:#fff;}
.rev-comment{width:100%;background:var(--dark);border:1px solid var(--border-light);color:var(--text);font-size:11px;padding:5px 7px;border-radius:2px;font-family:"Noto Sans JP",sans-serif;outline:none;resize:none;}
.rev-comment:focus{border-color:var(--orange);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--orange-dark);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}
</style>
</head>

// ================================================================
const SL = {unsubmitted:"未提出", pending:"判定待ち", pass:"Pass", keep:"Keep Trying"};
const SC = {unsubmitted:"sbadge s-un", pending:"sbadge s-pe", pass:"sbadge s-pa", keep:"sbadge s-ke"};

function totalViews(){ return DOMAINS.reduce((a,d) => a + d.views.length * 3, 0); }

function passCount(uid){
  let n=0;
  DOMAINS.forEach(d => PROGRESS[uid][d.id].subjects.forEach(s =>
    d.views.forEach(v => { if(s.views[v.id].status==="pass") n++; })
  ));
  return n;
}
function seminarCount(uid){ return DOMAINS.filter(d => PROGRESS[uid][d.id].seminarSelected !== null).length; }
function canEntry(uid){ return passCount(uid)===totalViews() && seminarCount(uid)===DOMAINS.length; }
function subjectAllPass(uid,domainId,si){
  const d = DOMAINS.find(x=>x.id===domainId);
  return d.views.every(v => PROGRESS[uid][domainId].subjects[si].views[v.id].status==="pass");
}
function domainPassCount(uid,domainId){
  const d = DOMAINS.find(x=>x.id===domainId);
  let n=0, total=d.views.length*3;
  PROGRESS[uid][domainId].subjects.forEach(s => d.views.forEach(v => { if(s.views[v.id].status==="pass") n++; }));
  return {n, total};
}

function updateProgressBar(){
  const pass=passCount(CURRENT_UID), total=totalViews();

  document.getElementById("pass-count").textContent = pass;
  document.getElementById("total-count").textContent = total;
  document.getElementById("prog-fill").style.width = pct+"%";
  const btn=document.getElementById("entry-btn"), hint=document.getElementById("entry-hint");
  if(canEntry(CURRENT_UID)){
    btn.disabled=false;
    hint.textContent="✅ 全条件達成！エントリーできます";

  } else {
    btn.disabled=true;

  }
}

function updateDomainMeta(domainId){
  const domain=DOMAINS.find(d=>d.id===domainId);
  const prog=PROGRESS[CURRENT_UID][domain.id];
  const el=document.getElementById(`dmeta-${domainId}`);
  if(!el) return;

  const semHTML = prog.seminarSelected!==null
    ? `<span class="done-badge">✓ ${domain.seminarDates[prog.seminarSelected]}</span>`
    : `<span class="tag">未受講</span>`;

  const subjHTML = [0,1,2].map(si => {
    const name=prog.subjects[si].name||`被検者${si+1}`;
    const allPass=subjectAllPass(CURRENT_UID,domainId,si);
    const dots=domain.views.map(v=>{
      const s=prog.subjects[si].views[v.id].status;
      return `<div class="subj-dot ${s==="pass"?"pa":s==="keep"?"ke":s==="pending"?"pe":""}"></div>`;
    }).join("");
    return `<div style="display:flex;align-items:center;gap:4px;">
      ${allPass?`<span class="done-badge" style="font-size:9px;padding:1px 5px;">✓</span>`:`<span class="tag" style="font-size:9px;padding:1px 5px;">${si+1}</span>`}
      <span style="font-size:10px;color:var(--text-dim);max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
      <div style="display:flex;gap:3px;">${dots}</div>
    </div>`;
  }).join("");

  el.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">${semHTML}${subjHTML}</div>`;

  // Tab labels & completion style
  [0,1,2].forEach(si => {
    const tab=document.getElementById(`stab-${domainId}-${si}`);
    if(!tab) return;
    const name=prog.subjects[si].name;
    const allPass=subjectAllPass(CURRENT_UID,domainId,si);
    const isActive=activeSubject[domainId]===si;
    tab.textContent=name?name:`被検者 ${si+1}`;
    tab.className=`subject-tab ${isActive?"active":""} ${allPass?"complete":""}`;
  });

  // Card border
  const {n,total}=domainPassCount(CURRENT_UID,domainId);
  const card=document.getElementById(`dc-${domainId}`);
  if(card) card.classList.toggle("completed", n===total && prog.seminarSelected!==null);

  updateProgressBar();
}

function toggleDomain(domainId){
  document.getElementById(`db-${domainId}`).classList.toggle("open");
  document.getElementById(`chev-${domainId}`).classList.toggle("open");
}
function switchSubject(domainId,si){
  activeSubject[domainId]=si;
  [0,1,2].forEach(i=>{
    document.getElementById(`spanel-${domainId}-${i}`).classList.toggle("active",i===si);
  });
  updateDomainMeta(domainId);
}
function selectSeminar(domainId,idx){
  PROGRESS[CURRENT_UID][domainId].seminarSelected=idx;
  DOMAINS.find(d=>d.id===domainId).seminarDates.forEach((_,i)=>{
    const btn=document.getElementById(`sb-${domainId}-${i}`);
    if(btn) btn.className=`sem-btn ${i===idx?"selected":""}`;
  });
  updateDomainMeta(domainId);
}
function updateSubjectName(domainId,si,val){
  PROGRESS[CURRENT_UID][domainId].subjects[si].name=val;
  updateDomainMeta(domainId);
}
function handleUpload(domainId,si,viewId,input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const url=e.target.result;
    const vs=PROGRESS[CURRENT_UID][domainId].subjects[si].views[viewId];
    vs.fileDataUrl=url; vs.status="pending"; vs.feedback="判定待ちです。担当者が確認します。";
    const prev=document.getElementById(`prev-${domainId}-${si}-${viewId}`);
    const ph=document.getElementById(`ph-${domainId}-${si}-${viewId}`);
    if(prev){prev.src=url;prev.style.display="block";}
    if(ph) ph.style.display="none";
    refreshImageStatus(domainId,si,viewId);
    updateDomainMeta(domainId);
  };
  reader.readAsDataURL(file);
}
function refreshImageStatus(domainId,si,viewId){
  const vs=PROGRESS[CURRENT_UID][domainId].subjects[si].views[viewId];
  const stEl=document.getElementById(`st-${domainId}-${si}-${viewId}`);
  const fbEl=document.getElementById(`fb-${domainId}-${si}-${viewId}`);
  if(stEl){stEl.className=SC[vs.status];stEl.textContent=SL[vs.status];}
  if(fbEl){
    fbEl.textContent=vs.feedback||"（フィードバックなし）";
    fbEl.className="feedback"+(vs.status==="pass"?" pa":vs.status==="keep"?" ke":"");
  }
}

      }).join("");
      return `<div id="rvpanel-${uid}-${domain.id}-${si}" class="subject-panel ${si===0?'active':''}">
        <div class="rev-img-grid">${viewsHTML}</div>
      </div>`;
    }).join("");
    sec.innerHTML=`
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--orange);">${domain.icon} ${domain.name}</div>
      <div class="subject-tabs">${tabsHTML}</div>
      ${panelsHTML}`;
    container.appendChild(sec);
  });
}

function switchReviewSubject(uid,domainId,si){
  [0,1,2].forEach(i=>{
    const tab=document.getElementById(`rvtab-${uid}-${domainId}-${i}`);
    const panel=document.getElementById(`rvpanel-${uid}-${domainId}-${i}`);
    if(tab) tab.classList.toggle("active",i===si);
    if(panel) panel.classList.toggle("active",i===si);
  });
}

function reviewSet(uid,domainId,si,viewId,status){
  const cmt=document.getElementById(`rvcmt-${uid}-${domainId}-${si}-${viewId}`);
  const comment=cmt?cmt.value:"";
  const vs=PROGRESS[uid][domainId].subjects[si].views[viewId];
  vs.status=status;
  vs.feedback=comment||(status==="pass"?"よく描出できています！":"もう一度練習してみてください。");
  const rvst=document.getElementById(`rvst-${uid}-${domainId}-${si}-${viewId}`);
  if(rvst){rvst.className=SC[status];rvst.textContent=SL[status];}
  if(uid===CURRENT_UID){
    refreshImageStatus(domainId,si,viewId);
    updateDomainMeta(domainId);
  }
  renderMemberList();
}

// ================================================================
// ENTRY
// ================================================================
document.getElementById("entry-btn").addEventListener("click",()=>{
  if(canEntry(CURRENT_UID)) alert("🎉 認定試験へのエントリーが完了しました！\n\n2026年8月2日（日）の認定試験に参加できます。");
});

// ================================================================
// INIT
// ================================================================
initProgress();
updateCountdown();
setInterval(updateCountdown, 60000);
renderDomainList();
updateProgressBar();
</script>
