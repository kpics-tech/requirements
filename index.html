<style>
:root {
  --orange: #E8A020;
  --orange-light: #F5B84A;
  --orange-dark: #B87A10;
  --orange-bg: rgba(232,160,32,0.08);
  --black: #0C0C0C;
  --dark: #141414;
  --card: #1A1A1A;
  --border: #2A2A2A;
  --border-light: #333;
  --text: #F0F0F0;
  --text-muted: #888;
  --text-dim: #555;
  --pass: #3DD68C;
  --pass-bg: rgba(61,214,140,0.1);
  --pass-border: rgba(61,214,140,0.3);
  --keep: #F06060;
  --keep-bg: rgba(240,96,96,0.1);
  --keep-border: rgba(240,96,96,0.3);
  --pending-bg: rgba(232,160,32,0.12);
  --pending-border: rgba(232,160,32,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;overflow-x:hidden;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
.page{display:none;}.page.active{display:block;}

/* NAV */
.nav{background:var(--dark);border-bottom:2px solid var(--orange);position:sticky;top:0;z-index:100;padding:0 16px;}
.nav-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.nav-logo{height:32px;width:auto;}
.nav-title{font-family:"Bebas Neue",sans-serif;font-size:19px;letter-spacing:.06em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.nav-tab{padding:6px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;background:transparent;color:var(--text-muted);white-space:nowrap;}
.nav-tab.active{background:var(--orange);color:var(--black);border-color:var(--orange);}
.nav-tab:hover:not(.active){border-color:var(--border-light);color:var(--text);}
@media (max-width:480px){
  .nav-inner{gap:6px;}
  .nav-logo{height:26px;}
  .nav-title{font-size:15px;}
  .nav-tab{padding:5px 8px;font-size:10.5px;}
}

/* BANNER */
.banner{background:var(--dark);border-bottom:1px solid var(--border);padding:10px 16px;}
.banner-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.cd-days{font-family:"Bebas Neue",sans-serif;font-size:40px;color:var(--orange);line-height:1;}
.prog-track{flex:1;min-width:160px;max-width:300px;background:var(--border);border-radius:2px;height:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--orange-dark),var(--orange-light));border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1);}

.main{max-width:800px;margin:0 auto;padding:16px 16px 120px;}

/* DOMAIN CARD */
.domain-card{background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.domain-card.completed{border-color:var(--pass);box-shadow:0 0 0 1px rgba(61,214,140,.12);}
.domain-header{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s;}
.domain-header:hover{background:rgba(255,255,255,.02);}
.domain-num{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--orange);line-height:1;min-width:34px;}
.domain-info{flex:1;min-width:0;}
.domain-name{font-size:15px;font-weight:700;}
.domain-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.domain-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.chevron{transition:transform .25s;color:var(--text-dim);flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.domain-body{display:none;border-top:1px solid var(--border);}
.domain-body.open{display:block;}

/* SEMINAR */
.sem-btn{padding:7px 12px;font-size:12px;font-weight:600;border:1px solid var(--border-light);border-radius:2px;background:var(--dark);color:var(--text-muted);cursor:pointer;transition:all .15s;font-family:"Noto Sans JP",sans-serif;}
.sem-btn:hover{border-color:var(--orange);color:var(--orange);}
.sem-btn.selected{background:var(--orange);border-color:var(--orange);color:var(--black);font-weight:700;}

/* SEC LABEL */
.sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.sec-label::after{content:"";flex:1;height:1px;background:var(--border);}

/* FIELD */
.field{background:var(--dark);border:1px solid var(--border-light);border-radius:2px;color:var(--text);padding:7px 11px;font-size:13px;width:100%;font-family:"Noto Sans JP",sans-serif;outline:none;transition:border-color .15s;}
.field:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,160,32,.1);}
.field::placeholder{color:var(--text-dim);}

/* SUBJECT TABS */
.subject-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.subject-tab{padding:6px 14px;font-size:12px;font-weight:700;border-radius:2px;cursor:pointer;border:1px solid var(--border-light);background:var(--dark);color:var(--text-muted);transition:all .15s;white-space:nowrap;}
.subject-tab:hover{border-color:var(--orange);color:var(--orange);}
.subject-tab.active{background:var(--orange);border-color:var(--orange);color:var(--black);}
.subject-tab.complete{border-color:var(--pass);color:var(--pass);background:var(--pass-bg);}
.subject-tab.active.complete{background:var(--pass);color:var(--black);}
.subject-panel{display:none;}.subject-panel.active{display:block;}

/* IMAGE CARD */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.img-card{background:var(--dark);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;}
.img-top{position:relative;aspect-ratio:4/3;background:var(--black);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
.img-top:hover .upload-hint{opacity:1;}
.upload-hint{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;opacity:0;transition:opacity .15s;pointer-events:none;}
.upload-hint span{font-size:10px;color:var(--orange);}
.img-preview{width:100%;height:100%;object-fit:cover;display:none;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;text-align:center;}
.img-ph-icon{font-size:24px;opacity:.35;}
.img-ph-text{font-size:10px;color:var(--text-dim);line-height:1.4;}
.file-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-bottom{padding:7px;display:flex;flex-direction:column;gap:4px;}
.img-label{font-size:11px;font-weight:700;line-height:1.3;}

/* STATUS BADGE */
.sbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.04em;font-family:"JetBrains Mono",monospace;}
.s-un{background:var(--border);color:var(--text-muted);border:1px solid var(--border-light);}
.s-pe{background:var(--pending-bg);color:var(--orange-light);border:1px solid var(--pending-border);}
.s-pa{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border);}
.s-ke{background:var(--keep-bg);color:var(--keep);border:1px solid var(--keep-border);}

.feedback{font-size:11px;color:var(--text-muted);border-left:2px solid var(--border-light);padding:3px 7px;font-style:italic;background:var(--black);border-radius:0 2px 2px 0;}
.feedback.pa{border-left-color:var(--pass);color:var(--pass);}
.feedback.ke{border-left-color:var(--keep);color:var(--keep);}
.ref-btn{font-size:9px;background:var(--orange-bg);border:1px solid var(--pending-border);color:var(--orange);padding:2px 6px;border-radius:2px;cursor:pointer;font-weight:700;white-space:nowrap;}

/* MINI STATUS */
.done-badge{display:inline-flex;align-items:center;gap:3px;background:var(--pass-bg);border:1px solid var(--pass-border);color:var(--pass);font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;}
.tag{display:inline-block;background:var(--border);border:1px solid var(--border-light);color:var(--text-muted);font-size:10px;font-family:"JetBrains Mono",monospace;padding:2px 6px;border-radius:2px;}
.subj-dot{width:6px;height:6px;border-radius:50%;background:var(--border-light);}
.subj-dot.pa{background:var(--pass);}
.subj-dot.ke{background:var(--keep);}
.subj-dot.pe{background:var(--orange);}

/* ENTRY */
.entry-btn{width:100%;padding:17px;font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.1em;border:none;border-radius:3px;cursor:pointer;transition:all .2s;}
.entry-btn:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;}
.entry-btn:not(:disabled){background:var(--orange);color:var(--black);}
.entry-btn:not(:disabled):hover{background:var(--orange-light);transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,160,32,.3);}

/* POPUP */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--dark);border:1px solid var(--orange);border-radius:4px;padding:22px;max-width:460px;width:100%;max-height:80vh;overflow-y:auto;}
.popup-close{background:var(--card);border:1px solid var(--border-light);color:var(--text-muted);padding:4px 10px;border-radius:2px;cursor:pointer;font-size:12px;}

/* REVIEWER */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:13px;cursor:pointer;transition:border-color .15s;}
.member-card:hover{border-color:var(--orange);box-shadow:0 0 0 1px rgba(232,160,32,.15);}
.rev-img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;}
.rev-img-card{background:var(--card);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.rev-img-top{aspect-ratio:4/3;background:var(--black);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.rev-img-top img{width:100%;height:100%;object-fit:cover;}
.rev-img-bottom{padding:7px;display:flex;flex-direction:column;gap:5px;}
.rev-actions{display:flex;gap:4px;}
.rev-btn{padding:5px 9px;font-size:11px;font-weight:700;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;font-family:"Noto Sans JP",sans-serif;}
.rev-pass{background:var(--pass-bg);border-color:var(--pass-border);color:var(--pass);}
.rev-pass:hover{background:var(--pass);color:var(--black);}
.rev-keep{background:var(--keep-bg);border-color:var(--keep-border);color:var(--keep);}
.rev-keep:hover{background:var(--keep);color:#fff;}
.rev-comment{width:100%;background:var(--dark);border:1px solid var(--border-light);color:var(--text);font-size:11px;padding:5px 7px;border-radius:2px;font-family:"Noto Sans JP",sans-serif;outline:none;resize:none;}
.rev-comment:focus{border-color:var(--orange);}

/* MATRIX TABLE */
.matrix-table{border-collapse:collapse;font-size:11px;min-width:100%;}
.matrix-table th{background:var(--dark);border:1px solid var(--border);padding:5px 7px;text-align:center;font-weight:700;white-space:nowrap;position:sticky;top:0;z-index:2;}
.matrix-table th.sticky-col{position:sticky;left:0;z-index:3;background:var(--dark);}
.matrix-table td{border:1px solid var(--border);padding:4px 5px;text-align:center;white-space:nowrap;}
.matrix-table td.sticky-col{position:sticky;left:0;background:var(--card);z-index:1;font-weight:600;text-align:left;padding:4px 8px;}
.matrix-table tr:hover td{background:rgba(255,255,255,.03);}
.matrix-table tr:hover td.sticky-col{background:var(--card);}
.mx-cell{display:inline-block;width:14px;height:14px;border-radius:2px;vertical-align:middle;}
.mx-pass{background:var(--pass);}
.mx-keep{background:var(--keep);}
.mx-pending{background:var(--orange);}
.mx-un{background:var(--border-light);}
.mx-ok{background:var(--pass);color:var(--black);font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;}
.mx-ng{background:var(--border);color:var(--text-dim);font-size:9px;padding:1px 4px;border-radius:2px;}

::-webkit-scrollbar{width:4px;height:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}

/* ===== ログイン画面 ===== */
#auth-screen{
  display:none; position:fixed; inset:0; background:var(--black);
  z-index:500; align-items:center; justify-content:center; padding:20px;
}
#auth-screen.active{display:flex;}
.auth-box{
  background:var(--dark); border:1px solid var(--border); border-radius:6px;
  padding:28px 24px; width:100%; max-width:380px;
}
.auth-tab-row{display:flex; gap:4px; margin-bottom:20px;}
.auth-tab{
  flex:1; padding:7px; font-size:12px; font-weight:700; border-radius:2px;
  cursor:pointer; border:1px solid var(--border-light);
  background:var(--dark); color:var(--text-muted); transition:all .15s;
}
.auth-tab.active{background:var(--orange); border-color:var(--orange); color:var(--black);}
.auth-field-label{font-size:11px; color:var(--text-muted); margin-bottom:4px; margin-top:12px;}
.auth-error{
  font-size:11px; color:var(--keep); background:var(--keep-bg);
  border:1px solid var(--keep-border); border-radius:2px;
  padding:7px 10px; margin-top:10px; display:none;
}
.auth-error.show{display:block;}
.auth-btn{
  width:100%; margin-top:16px; padding:12px;
  font-family:"Bebas Neue",sans-serif; font-size:18px; letter-spacing:.08em;
  border:none; border-radius:3px; cursor:pointer;
  background:var(--orange); color:var(--black); transition:all .2s;
}
.auth-btn:hover{background:var(--orange-light);}
.auth-btn:disabled{background:var(--border); color:var(--text-dim); cursor:not-allowed;}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="auth-screen" class="active">
  <div class="auth-box fade-up">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange);letter-spacing:.06em;">K-PICS</div>
      <div style="font-size:12px;color:var(--text-muted);">認定試験ダッシュボード</div>
    </div>

    <!-- ログイン / 新規登録 タブ -->
    <div class="auth-tab-row">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">ログイン</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">新規登録</button>
    </div>

    <!-- ログインフォーム -->
    <div id="form-login">
      <div class="auth-field-label">メールアドレス</div>
      <input class="field" type="email" id="login-email" placeholder="example@med.ac.jp">
      <div class="auth-field-label">パスワード</div>
      <input class="field" type="password" id="login-password" placeholder="パスワード">
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">ログイン</button>
    </div>

    <!-- 新規登録フォーム -->
    <div id="form-signup" style="display:none;">
      <div class="auth-field-label">名前（フルネーム）</div>
      <input class="field" type="text" id="signup-name" placeholder="山田 太郎">
      <div class="auth-field-label">学年</div>
      <input class="field" type="number" id="signup-year" placeholder="5" min="1" max="6">
      <div class="auth-field-label">メールアドレス</div>
      <input class="field" type="email" id="signup-email" placeholder="example@med.ac.jp">
      <div class="auth-field-label">パスワード（6文字以上）</div>
      <input class="field" type="password" id="signup-password" placeholder="パスワード">
      <div class="auth-field-label" style="display:flex;align-items:center;gap:6px;">
        招待コード
        <span style="font-size:10px;color:var(--text-dim);">確認者の方のみ入力</span>
      </div>
      <input class="field" type="text" id="signup-invite" placeholder="（部員の方は空欄でOK）">
      <div class="auth-error" id="signup-error"></div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">登録する</button>
    </div>
  </div>
</div>

const CURRENT_UID = "m001";

const PROGRESS = {};
function initProgress() {
  MEMBERS.forEach(m => {
    if(PROGRESS[m.uid]) return;
    PROGRESS[m.uid] = {};
    DOMAINS.forEach(d => {
      if(d.isSimplePractice){
        // 血管穿刺：被検者なし、練習日だけ（最初3枠）
        PROGRESS[m.uid][d.id] = {
          seminarSelected: null,
          simpleDates: ["","",""], // 練習日（3回＋追加可能）
        };
      } else {
        PROGRESS[m.uid][d.id] = {
          seminarSelected: null,
          subjects: [0,1,2].map(() => ({
            name: "",
            views: Object.fromEntries(d.views.map(v => [v.id, {status:"unsubmitted", feedback:"", fileDataUrl:null}])),
            practiceDates: ["","",""],
          }))
        };
      }
    });
  });
}

// ================================================================
// HELPERS
// ================================================================
const SL = {unsubmitted:"未提出", pending:"判定待ち", pass:"Pass", keep:"Keep Trying"};
const SC = {unsubmitted:"sbadge s-un", pending:"sbadge s-pe", pass:"sbadge s-pa", keep:"sbadge s-ke"};

function totalViews(){ return DOMAINS.filter(d=>!d.isPracticeLog).reduce((a,d) => a + d.views.length * 3, 0); }

function passCount(uid){
  let n=0;
  DOMAINS.filter(d=>!d.isPracticeLog).forEach(d => PROGRESS[uid]?.[d.id]?.subjects.forEach(s =>
    d.views.forEach(v => { if(s.views[v.id]?.status==="pass") n++; })
  ));
  return n;
}
function practiceComplete(uid,domainId){
  const prog=PROGRESS[uid]?.[domainId];
  if(!prog) return false;
  const d=DOMAINS.find(x=>x.id===domainId);
  if(d.isSimplePractice){
    return (prog.simpleDates||[]).filter(dt=>dt.trim()!=="").length >= 3;
  }
  return prog.subjects.every(s => (s.practiceDates||[]).filter(dt=>dt.trim()!=="").length >= 3);
}
function seminarCount(uid){ return DOMAINS.filter(d => PROGRESS[uid]?.[d.id]?.seminarSelected !== null).length; }
function canEntry(uid){
  if(!PROGRESS[uid]) return false;
  const imagePassed = passCount(uid)===totalViews();
  // 血管穿刺の自主練習は受験必須条件から除外（スチューデントドクター限定の自主練習のため）
  const seminarsOK = seminarCount(uid)===DOMAINS.length;
  return imagePassed && seminarsOK;
}
function subjectAllPass(uid,domainId,si){
  const d = DOMAINS.find(x=>x.id===domainId);
  if(d.isSimplePractice) return false; // subjectタブなし
  if(d.isPracticeLog){
    const prog=PROGRESS[uid]?.[domainId];
    return (prog?.subjects[si]?.practiceDates||[]).filter(dt=>dt.trim()!=="").length >= 3;
  }
  return d.views.every(v => PROGRESS[uid]?.[domainId]?.subjects[si]?.views[v.id]?.status==="pass");
}
function domainPassCount(uid,domainId){
  const d = DOMAINS.find(x=>x.id===domainId);
  if(d.isSimplePractice){
    return {n: practiceComplete(uid,domainId)?1:0, total:1};
  }
  if(d.isPracticeLog){
    const ok = practiceComplete(uid,domainId);
    return {n: ok?1:0, total:1};
  }
  let n=0, total=d.views.length*3;
  PROGRESS[uid]?.[domainId]?.subjects.forEach(s => d.views.forEach(v => { if(s.views[v.id]?.status==="pass") n++; }));
  return {n, total};
}

function updateCountdown(){
  const diff = new Date("2026-08-02T09:00:00") - new Date();
  document.getElementById("cd-days").textContent = Math.max(0, Math.ceil(diff/86400000));
}
function updateProgressBar(){
  const uid=window.CURRENT_UID;
  if(!uid||!PROGRESS[uid]) return;
  const pass=passCount(uid), total=totalViews();
  const pct = total>0 ? Math.round(pass/total*100) : 0;
  document.getElementById("pass-count").textContent = pass;
  document.getElementById("total-count").textContent = total;
  document.getElementById("prog-fill").style.width = pct+"%";
  const btn=document.getElementById("entry-btn"), hint=document.getElementById("entry-hint");
  if(canEntry(uid)){
    btn.disabled=false;
    hint.textContent="✅ 全条件達成！エントリーできます";
    hint.style.color="var(--pass)";
  } else {
    btn.disabled=true;
    hint.textContent=`🔒 セミナー受講 ${seminarCount(uid)}/${DOMAINS.length}　キー画像Pass ${pass}/${total}`;
    hint.style.color="var(--text-dim)";
  }
}

  // 部員側で学年5未満（学年未登録含む）の場合はタブ自体を表示しない。

    const card=document.createElement("div");

    card.style.animationDelay=`${di*0.07}s`;

    // UIの種類を切り替え
    const innerBodyHTML = domain.isSimplePractice
      ? renderSimplePracticeBody(domain, uid)
      : domain.isPracticeLog
        ? renderPracticeLogBody(domain, uid)
        : renderImageBody(domain, uid);

    card.innerHTML=`
      <div class="domain-header" onclick="toggleDomain('${domain.id}')">
        <div class="domain-num">${String(di+1).padStart(2,"00")}</div>
        <div class="domain-info">
          <div class="domain-name">${domain.icon} ${domain.name}</div>
          <div class="domain-sub">${domain.subtitle}</div>
          <div class="domain-meta" id="dmeta-${domain.id}"></div>

        <svg class="chevron ${di===0?'open':''}" id="chev-${domain.id}" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="domain-body ${di===0?'open':''}" id="db-${domain.id}">
        <div style="padding:14px 16px;">
          <div class="sec-label">セミナー受講</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
            ${domain.seminarDates.map((dt,i)=>`
              <button id="sb-${domain.id}-${i}" class="sem-btn ${prog.seminarSelected===i?'selected':''}"

      [0,1,2].forEach(si => renderImageGrid(domain.id, si));

function addSimpleDate(domainId){
  const uid=window.CURRENT_UID;
  const prog=PROGRESS[uid][domainId];
  const di=prog.simpleDates.length;
  prog.simpleDates.push("");
  const list=document.getElementById(`pdlist-${domainId}-simple`);
  if(!list) return;
  const row=document.createElement("div");
  row.id=`pdrow-${domainId}-simple-${di}`;
  row.style.cssText="display:flex;align-items:center;gap:8px;";
  row.innerHTML=`
    <span style="font-size:11px;color:var(--text-muted);min-width:44px;">練習 ${di+1}</span>
    <input class="field" type="date" value=""
      onchange="updateSimpleDate('${domainId}',${di},this.value)"
      style="max-width:180px;">`;
  list.appendChild(row);
}

function updateSimpleDate(domainId,di,val){
  const uid=window.CURRENT_UID;
  const prog=PROGRESS[uid][domainId];
  while(prog.simpleDates.length<=di) prog.simpleDates.push("");
  prog.simpleDates[di]=val;
  const filled=prog.simpleDates.filter(d=>d.trim()!=="").length;
  const statusEl=document.getElementById(`simple-status-${domainId}`);
  if(statusEl) statusEl.innerHTML=filled>=3
    ? `<span class="sbadge s-pa">✓ ${filled}回練習済み</span>`
    : `<span class="sbadge s-un">あと${3-filled}日入力で完了</span>`;
  updateDomainMeta(domainId);
  // DB保存
  _supabase.from('practice_dates').upsert({
    uid, domain_id:domainId, subject_idx:0, date_idx:di,
    practice_date:val||null, updated_at:new Date().toISOString(),
  },{onConflict:'uid,domain_id,subject_idx,date_idx'}).catch(()=>{});
}

function updateDomainMeta(domainId){
  const domain=DOMAINS.find(d=>d.id===domainId);
  const uid=window.CURRENT_UID;
  if(!uid||!PROGRESS[uid]||!PROGRESS[uid][domainId]) return;
  const prog=PROGRESS[uid][domain.id];
  const el=document.getElementById(`dmeta-${domainId}`);
  if(!el) return;

  const semHTML = prog.seminarSelected!==null
    ? `<span class="done-badge">✓ ${domain.seminarDates[prog.seminarSelected]}</span>`
    : `<span class="tag">未受講</span>`;

  // 血管穿刺（被検者なし）は専用表示
  let subjHTML = "";
  if(domain.isSimplePractice){
    const dates=prog.simpleDates||[];
    const filled=dates.filter(d=>d.trim()!=="").length;
    const dots=Array(3).fill(0).map((_,i)=>
      `<div class="subj-dot ${i<filled?"pa":""}"></div>`).join("");
    subjHTML=`<div style="display:flex;align-items:center;gap:4px;">
      ${filled>=3?`<span class="done-badge" style="font-size:9px;padding:1px 5px;">✓</span>`:`<span class="tag" style="font-size:9px;padding:1px 5px;">${filled}/3</span>`}
      <div style="display:flex;gap:3px;">${dots}</div>
    </div>`;
  } else {
    subjHTML = [0,1,2].map(si => {
      const subj=prog.subjects[si];
      const dateStr=subj.name;
      const displayName=domain.isPracticeLog
        ? `被検者${si+1}`
        : (dateStr ? dateStr.slice(5) : `被検者${si+1}`);
      const allPass=subjectAllPass(uid,domainId,si);
      let dots="";
      if(!domain.isPracticeLog){
        dots=domain.views.map(v=>{
          const s=subj.views[v.id]?.status||"unsubmitted";
          return `<div class="subj-dot ${s==="pass"?"pa":s==="keep"?"ke":s==="pending"?"pe":""}"></div>`;
        }).join("");
      } else {
        const pdates=subj.practiceDates||[];
        dots=pdates.slice(0,3).map(d=>
          `<div class="subj-dot ${d.trim()?"pa":""}"></div>`
        ).join("");
      }
      return `<div style="display:flex;align-items:center;gap:4px;">
        ${allPass?`<span class="done-badge" style="font-size:9px;padding:1px 5px;">✓</span>`:`<span class="tag" style="font-size:9px;padding:1px 5px;">${si+1}</span>`}
        <span style="font-size:10px;color:var(--text-dim);max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${displayName}</span>
        <div style="display:flex;gap:3px;">${dots}</div>
      </div>`;
    }).join("");
  }

  el.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">${semHTML}${subjHTML}</div>`;

  // Tab labels（isSimplePracticeはタブなし）
  if(!domain.isSimplePractice){
    [0,1,2].forEach(si => {
      const tab=document.getElementById(`stab-${domainId}-${si}`);
      if(!tab) return;
      const name=prog.subjects[si].name;
      const allPass=subjectAllPass(uid,domainId,si);
      const isActive=activeSubject[domainId]===si;
      tab.textContent=(!domain.isPracticeLog && name) ? name.slice(5)||`被検者${si+1}` : `被検者 ${si+1}`;
      tab.className=`subject-tab ${isActive?"active":""} ${allPass?"complete":""}`;
    });
  }

  // Card border
  const {n,total}=domainPassCount(uid,domainId);
  const card=document.getElementById(`dc-${domainId}`);
  if(card) card.classList.toggle("completed", n===total && prog.seminarSelected!==null);

  updateProgressBar();
}

// ================================================================
// 画像圧縮（Supabase無料枠節約：最大800px・品質70%）
// ================================================================
function compressImage(file, maxPx=800, quality=0.70){
  return new Promise((resolve)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{ img.src=e.target.result; };
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width, h=img.height;
      if(w>maxPx||h>maxPx){
        if(w>h){ h=Math.round(h*maxPx/w); w=maxPx; }
        else { w=Math.round(w*maxPx/h); h=maxPx; }
      }
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(new File([blob],file.name.replace(/\.[^.]+$/,".jpg"),{type:"image/jpeg"})),"image/jpeg",quality);
    };
    reader.readAsDataURL(file);
  });
}

async function handleUpload(domainId,si,viewId,input){
  const file=input.files[0]; if(!file) return;
  const uid = window.CURRENT_UID;
  showToast('画像を処理中...','loading');
  try {
    const compressed = await compressImage(file);
    const localUrl=URL.createObjectURL(compressed);
    const prev=document.getElementById(`prev-${domainId}-${si}-${viewId}`);
    const ph=document.getElementById(`ph-${domainId}-${si}-${viewId}`);
    if(prev){prev.src=localUrl;prev.style.display="block";}
    if(ph) ph.style.display="none";
    const imageUrl=await uploadImageToStorage(uid,domainId,si,viewId,compressed);
    await saveSubmissionToDB(uid,domainId,si,viewId,'pending','判定待ちです。担当者が確認します。',imageUrl);
    const vs=PROGRESS[uid][domainId].subjects[si].views[viewId];
    vs.fileDataUrl=imageUrl; vs.status="pending"; vs.feedback="判定待ちです。担当者が確認します。";
    refreshImageStatus(domainId,si,viewId);
    updateDomainMeta(domainId);
    hideToast(); showToast('アップロード完了！','success');
  } catch(err){ hideToast(); showToast(err.message,'error'); }
}
function refreshImageStatus(domainId,si,viewId){
  const uid = window.CURRENT_UID;
  const vs=PROGRESS[uid][domainId].subjects[si].views[viewId];
  const stEl=document.getElementById(`st-${domainId}-${si}-${viewId}`);
  const fbEl=document.getElementById(`fb-${domainId}-${si}-${viewId}`);
  if(stEl){stEl.className=SC[vs.status];stEl.textContent=SL[vs.status];}
  if(fbEl){
    if(vs.status==="pass"){
      fbEl.style.display="none";
    } else {
      fbEl.style.display="";
      fbEl.textContent=vs.feedback||"（フィードバックなし）";
      fbEl.className="feedback"+(vs.status==="keep"?" ke":vs.status==="pending"?" ":"");
    }
  }
}

function renderMatrix(){
  const container=document.getElementById("matrix-container");
  if(!container) return;
  const imageDomains=DOMAINS.filter(d=>!d.isPracticeLog && !d.isSimplePractice && d.views.length>0);
  const vascularDomain=DOMAINS.find(d=>d.isSimplePractice);

  let headerRow1='<tr><th class="sticky-col" rowspan="3" style="min-width:80px;">部員</th>';
  let headerRow2='';
  let headerRow3='';

  // セミナー
  headerRow1+=`<th colspan="${DOMAINS.length}" style="color:var(--orange);border-bottom:none;">セミナー</th>`;
  DOMAINS.forEach(d=>{
    headerRow2+=`<th rowspan="2" title="${d.name}" style="font-size:10px;max-width:50px;">${d.icon}</th>`;
  });

  // 画像断面
  imageDomains.forEach(d=>{
    const cols=d.views.length*3;
    headerRow1+=`<th colspan="${cols}" style="color:var(--orange);border-bottom:none;">${d.icon} ${d.name}</th>`;
    d.views.forEach(v=>{
      headerRow2+=`<th colspan="3" title="${v.label}" style="font-size:10px;">${v.label.length>7?v.label.slice(0,7)+"…":v.label}</th>`;
      headerRow3+="<th style='font-size:9px;color:var(--text-dim);'>①</th><th style='font-size:9px;color:var(--text-dim);'>②</th><th style='font-size:9px;color:var(--text-dim);'>③</th>";
    });
  });

  // 血管穿刺（シンプル：練習日3回）
  if(vascularDomain){
    headerRow1+=`<th colspan="3" style="color:var(--orange);border-bottom:none;">${vascularDomain.icon} 血管穿刺</th>`;
    [0,1,2].forEach(di=>{
      headerRow2+=`<th rowspan="2" style="font-size:10px;">練習${di+1}</th>`;
    });
  }
  headerRow1+="</tr>";

  // データ行
  let bodyRows="";
  MEMBERS.forEach(m=>{
    const prog=PROGRESS[m.uid];
    if(!prog) return;
    bodyRows+=`<tr>`;
    bodyRows+=`<td class="sticky-col" style="cursor:pointer;" onclick="selectMember('${m.uid}')" title="クリックして画像を確認">${m.name}<br><span style="font-size:9px;color:var(--text-dim);">${m.year}年</span></td>`;

    // セミナー
    DOMAINS.forEach(d=>{
      const sel=prog[d.id]?.seminarSelected;
      bodyRows+=sel!=null
        ?`<td><span class="mx-ok">✓</span></td>`
        :`<td><span class="mx-ng">-</span></td>`;
    });

    // 画像断面
    imageDomains.forEach(d=>{
      d.views.forEach(v=>{
        [0,1,2].forEach(si=>{
          const st=prog[d.id]?.subjects[si]?.views[v.id]?.status||"unsubmitted";
          const cls=st==="pass"?"mx-pass":st==="keep"?"mx-keep":st==="pending"?"mx-pending":"mx-un";
          const title={"pass":"Pass","keep":"Keep Trying","pending":"判定待ち","unsubmitted":"未提出"}[st];
          bodyRows+=`<td><span class="mx-cell ${cls}" title="${title}"></span></td>`;
        });
      });
    });

    // 血管穿刺（simpleDates）
    if(vascularDomain){
      const dates=prog[vascularDomain.id]?.simpleDates||[];
      [0,1,2].forEach(di=>{
        const dv=dates[di]||"";
        bodyRows+=dv
          ?`<td style="font-size:9px;color:var(--pass);">${dv.slice(5)}</td>`
          :`<td><span class="mx-cell mx-un"></span></td>`;
      });
    }
    bodyRows+=`</tr>`;
  });

  container.innerHTML=`
    <table class="matrix-table">
      <thead>
        ${headerRow1}
        <tr>${headerRow2}</tr>
        <tr>${headerRow3}</tr>
      </thead>
      <tbody>${bodyRows}</tbody>
    </table>`;
}

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page-reviewer").classList.add("active");

  const card=document.querySelector(`[data-uid="${uid}"]`);
  if(card){ card.style.opacity='0.5'; card.style.pointerEvents='none'; }
  await loadImagesForMember(uid);

function renderReviewDomains(uid){
  const container=document.getElementById("review-domain-list");
  container.innerHTML="";

    const prog=PROGRESS[uid]?.[domain.id];
    if(!prog) return;
    const sec=document.createElement("div");
    sec.style.marginBottom="20px";

    // 血管穿刺（被検者なし・練習日のみ）
    if(domain.isSimplePractice){
      const dates=prog.simpleDates||[];
      const filled=dates.filter(d=>d&&d.trim()!=="").length;
      const datesHTML=dates.length>0
        ? dates.map((d,di)=>`
            <div style="font-size:12px;color:var(--text-muted);padding:4px 0;display:flex;align-items:center;gap:8px;">
              <span style="min-width:48px;">練習 ${di+1}</span>
              <span style="color:${d&&d.trim()?'var(--pass)':'var(--text-dim)'};">${d&&d.trim()?d:'未入力'}</span>
              ${d&&d.trim()?'<span style="color:var(--pass);font-size:10px;">✓</span>':''}
            </div>`).join("")
        : `<div style="font-size:12px;color:var(--text-dim);">練習日が未入力です</div>`;
      const seminarSel=prog.seminarSelected;
      const seminarHTML=seminarSel!=null
        ? `<span style="background:var(--pass-bg);border:1px solid var(--pass-border);color:var(--pass);font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;">✓ ${domain.seminarDates[seminarSel]}</span>`
        : `<span style="background:var(--border);border:1px solid var(--border-light);color:var(--text-muted);font-size:10px;padding:2px 6px;border-radius:2px;">未受講</span>`;
      const statusBadge=filled>=3
        ? `<span style="background:var(--pass-bg);border:1px solid var(--pass-border);color:var(--pass);font-size:11px;font-weight:700;padding:3px 10px;border-radius:2px;">✓ ${filled}回練習完了</span>`
        : `<span style="background:var(--border);border:1px solid var(--border-light);color:var(--text-muted);font-size:11px;padding:3px 10px;border-radius:2px;">あと${3-filled}日入力で完了</span>`;
      sec.innerHTML=`
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--orange);">${domain.icon} ${domain.name}</div>

        <div style="background:var(--dark);border:1px solid var(--border);border-radius:3px;padding:10px;">${datesHTML}</div>`;
      container.appendChild(sec);

    }

    // 通常ドメイン（画像あり）
    const tabsHTML=[0,1,2].map(si=>{
      const name=prog.subjects[si].name;
      const label=name ? name.slice(5)||`被検者${si+1}` : `被検者${si+1}`;
      return `<button id="rvtab-${uid}-${domain.id}-${si}"
        class="subject-tab ${si===0?'active':''}"
        onclick="switchReviewSubject('${uid}','${domain.id}',${si})">${label}</button>`;
    }).join("");

    const panelsHTML=[0,1,2].map(si=>{
      const viewsHTML=domain.views.map(view=>{

                ?`<img src="${vs.fileDataUrl}" style="width:100%;height:100%;object-fit:cover;">`

function switchReviewSubject(uid,domainId,si){
  [0,1,2].forEach(i=>{
    const tab=document.getElementById(`rvtab-${uid}-${domainId}-${i}`);
    const panel=document.getElementById(`rvpanel-${uid}-${domainId}-${i}`);
    if(tab) tab.classList.toggle("active",i===si);
    if(panel) panel.classList.toggle("active",i===si);
  });
}

async function reviewSet(uid,domainId,si,viewId,status){
  const cmt=document.getElementById(`rvcmt-${uid}-${domainId}-${si}-${viewId}`);
  const comment=cmt?cmt.value:"";
  const vs=PROGRESS[uid][domainId].subjects[si].views[viewId];
  const feedback=comment||(status==="pass"?"よく描出できています！":"もう一度練習してみてください。");
  vs.status=status; vs.feedback=feedback;
  const rvst=document.getElementById(`rvst-${uid}-${domainId}-${si}-${viewId}`);
  if(rvst){rvst.className=SC[status];rvst.textContent=SL[status];}
  // Pass時はtextareaを非表示、Keep時は表示してフィードバックを促す
  if(cmt){
    if(status==="pass"){
      cmt.style.display="none";
      cmt.value="";
    } else {
      cmt.style.display="";
      if(!cmt.value) cmt.placeholder="フィードバックを入力（どこを改善するか具体的に）";
    }
  }
  if(uid===window.CURRENT_UID){
    refreshImageStatus(domainId,si,viewId);
    updateDomainMeta(domainId);
    // 全Pass達成チェック
    if(status==="pass" && canEntry(uid)){
      triggerCelebration(uid);
    }
  }
  renderMemberList();
  updateProgressBar();
  try {
    await saveSubmissionToDB(uid,domainId,si,viewId,status,feedback,vs.fileDataUrl);
    showToast('判定を保存しました','success');
  } catch(err){ showToast('判定の保存に失敗しました','error'); }
}

function launchFireworks(){
  const old = document.getElementById('kp-fireworks-overlay');
  if(old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'kp-fireworks-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:1000;pointer-events:none;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;
  `;
  document.body.appendChild(overlay);

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  overlay.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const msg = document.createElement('div');
  msg.style.cssText = `
    position:relative;z-index:2;
    font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,6vw,50px);
    letter-spacing:.1em;color:#E8A020;text-align:center;
    text-shadow:0 0 30px rgba(232,160,32,.8),0 0 60px rgba(232,160,32,.5);
    animation:kpPulse 0.6s ease-out;
  `;
  msg.textContent = '🏆 ALL PASS ACHIEVED! 🏆';
  overlay.appendChild(msg);

  const sub = document.createElement('div');
  sub.style.cssText = `
    position:relative;z-index:2;font-size:clamp(12px,2.5vw,17px);
    color:#F0F0F0;text-align:center;font-weight:700;letter-spacing:.04em;
    animation:kpFadeIn 1s ease-out 0.3s both;
  `;
  sub.textContent = '全条件達成！認定試験受験資格を獲得しました';
  overlay.appendChild(sub);

  if(!document.getElementById('kp-celebrate-style')){
    const style = document.createElement('style');
    style.id = 'kp-celebrate-style';
    style.textContent = `
      @keyframes kpPulse{0%{opacity:0;transform:scale(.5);}60%{transform:scale(1.08);}100%{opacity:1;transform:scale(1);}}
      @keyframes kpFadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
      @keyframes kpCardIn{from{opacity:0;transform:scale(.92) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
      @keyframes kpGlow{0%,100%{box-shadow:0 0 20px rgba(232,160,32,.4),0 0 60px rgba(232,160,32,.2);}50%{box-shadow:0 0 40px rgba(232,160,32,.8),0 0 100px rgba(232,160,32,.4);}}
    `;
    document.head.appendChild(style);
  }

  const particles = [];
  const colors = ['#E8A020','#F5B84A','#3DD68C','#F06060','#60B0F0','#E060F0','#FFFF55'];
  function spawnBurst(x,y){
    const count = 55+Math.floor(Math.random()*35);
    for(let i=0;i<count;i++){
      const angle=(Math.PI*2*i)/count+Math.random()*0.3;
      const speed=2+Math.random()*5;
      particles.push({
        x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        life:1,decay:0.012+Math.random()*0.01,
        size:2+Math.random()*3,
        color:colors[Math.floor(Math.random()*colors.length)],
        trail:[],
      });
    }
  }
  const w=canvas.width,h=canvas.height;
  [[w*.2,h*.35],[w*.5,h*.22],[w*.8,h*.3],[w*.35,h*.45],[w*.65,h*.4],[w*.1,h*.5],[w*.9,h*.45]]
    .forEach((p,i)=>setTimeout(()=>spawnBurst(p[0],p[1]),i*230));
  for(let i=0;i<8;i++) setTimeout(()=>spawnBurst(w*.1+Math.random()*w*.8,h*.1+Math.random()*h*.5),500+Math.random()*2000);

  let frame=0;
  function animate(){
    ctx.fillStyle='rgba(0,0,0,0.16)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.trail.push({x:p.x,y:p.y,life:p.life});
      if(p.trail.length>6) p.trail.shift();
      p.trail.forEach((t,ti)=>{
        ctx.globalAlpha=(t.life*(ti/p.trail.length))*0.35;
        ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(t.x,t.y,p.size*.5,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color;ctx.shadowBlur=7;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.vx*=0.99;p.life-=p.decay;
      if(p.life<=0) particles.splice(i,1);
    }
    ctx.globalAlpha=1;
    frame++;
    if(frame<210) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
  setTimeout(()=>{
    overlay.style.transition='opacity 0.8s';overlay.style.opacity='0';
    setTimeout(()=>overlay.remove(),900);
  },3200);
}

function showToast(msg, type='info'){
  const old=document.getElementById('kp-toast'); if(old) old.remove();
  const colors={
    info:'background:var(--dark);border-color:var(--border-light);color:var(--text-muted)',
    success:'background:var(--pass-bg);border-color:var(--pass-border);color:var(--pass)',
    error:'background:var(--keep-bg);border-color:var(--keep-border);color:var(--keep)',
    loading:'background:var(--pending-bg);border-color:var(--pending-border);color:var(--orange-light)',
  };
  const icons={info:'ℹ️',success:'✅',error:'❌',loading:'⏳'};
  const el=document.createElement('div'); el.id='kp-toast';
  el.style.cssText=`position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    z-index:9999;padding:10px 18px;border-radius:4px;border:1px solid;
    font-size:13px;font-family:'Noto Sans JP',sans-serif;
    box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;${colors[type]||colors.info}`;
  el.textContent=`${icons[type]||''} ${msg}`;
  document.body.appendChild(el);
  if(type!=='loading') setTimeout(()=>el.remove(),3000);
  return el;
}
function hideToast(){ const el=document.getElementById('kp-toast'); if(el) el.remove(); }

async function uploadImageToStorage(uid,domainId,si,viewId,file){
  const ext=file.name.split('.').pop()||'jpg';
  const path=`${uid}/${domainId}/${si}/${viewId}_${Date.now()}.${ext}`;
  const {error}=await _supabase.storage.from('echo-images').upload(path,file,{upsert:true});
  if(error) throw new Error('画像の保存に失敗しました: '+error.message);
  const {data:urlData}=_supabase.storage.from('echo-images').getPublicUrl(path);
  return urlData.publicUrl;
}

async function saveSubmissionToDB(uid,domainId,si,viewId,status,feedback,imageUrl){
  const {error}=await _supabase.from('submissions').upsert({
    uid, domain_id:domainId, subject_idx:si, view_id:viewId,
    status, feedback, image_url:imageUrl, updated_at:new Date().toISOString(),
  },{onConflict:'uid,domain_id,subject_idx,view_id'});
  if(error) throw new Error('データの保存に失敗しました: '+error.message);
}

// ================================================================
// ログイン機能
// ================================================================
const REVIEWER_INVITE_CODE='KPICS-REVIEWER-2026';

function switchAuthTab(tab){
  document.getElementById('form-login').style.display  = tab==='login'  ? 'block':'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block':'none';
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('signup-error').classList.remove('show');
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  if(!email||!password){ errEl.textContent='メールアドレスとパスワードを入力してください'; errEl.classList.add('show'); return; }
  btn.disabled=true; btn.textContent='ログイン中...';
  const {error}=await _supabase.auth.signInWithPassword({email,password});
  btn.disabled=false; btn.textContent='ログイン';
  if(error){ errEl.textContent='メールアドレスまたはパスワードが間違っています'; errEl.classList.add('show'); }
}

async function doSignup(){
  const name=document.getElementById('signup-name').value.trim();
  const year=parseInt(document.getElementById('signup-year').value);
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  const invite=document.getElementById('signup-invite').value.trim();
  const errEl=document.getElementById('signup-error');
  const btn=document.getElementById('signup-btn');
  if(!name||!email||!password){ errEl.textContent='名前・メールアドレス・パスワードは必須です'; errEl.classList.add('show'); return; }
  if(password.length<6){ errEl.textContent='パスワードは6文字以上にしてください'; errEl.classList.add('show'); return; }
  if(invite&&invite!==REVIEWER_INVITE_CODE){ errEl.textContent='招待コードが正しくありません'; errEl.classList.add('show'); return; }
  const role=(invite===REVIEWER_INVITE_CODE)?'reviewer':'member';
  btn.disabled=true; btn.textContent='登録中...';
  const {data,error}=await _supabase.auth.signUp({email,password});
  if(error){ btn.disabled=false; btn.textContent='登録する'; errEl.textContent='登録に失敗しました: '+error.message; errEl.classList.add('show'); return; }
  const uid=data.user.id;
  // profiles保存を最大3回リトライ（signUp直後はDBに反映されるまで少し待つことがある）
  let pErr=null;
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,800));
    const {error:e}=await _supabase.from('profiles').upsert({id:uid,name,year:isNaN(year)?null:year,role},{onConflict:'id'});
    pErr=e;
    if(!pErr) break;
  }
  btn.disabled=false; btn.textContent='登録する';
  if(pErr){
    // profilesへの保存失敗 → 作ったauthアカウントを削除して完全にやり直せるよう案内
    errEl.textContent=`プロフィール保存に失敗しました（${pErr.message}）。管理者に連絡してください。`;
    errEl.classList.add('show');
    return;
  }
  // 登録成功メッセージ（role確認用）
  const roleLabel=role==='reviewer'?'確認者':'部員';
  showToast(`登録完了しました（${roleLabel}として登録）`, 'success');
}

async function doLogout(){ await _supabase.auth.signOut(); location.reload(); }

// ================================================================
// 認証状態の監視（アプリの起点）
// ================================================================
window.CURRENT_UID  = null;
window.CURRENT_ROLE = 'member';
window.CURRENT_YEAR = null;

// 30分無操作で自動ログアウト
let _idleTimer;
function resetIdleTimer(){
  clearTimeout(_idleTimer);
  _idleTimer=setTimeout(async()=>{
    await _supabase.auth.signOut();
    alert('30分間操作がなかったため、自動ログアウトしました。');
    location.reload();
  }, 30*60*1000);
}
['click','keydown','touchstart','scroll'].forEach(ev=>
  document.addEventListener(ev, resetIdleTimer, {passive:true})
);
resetIdleTimer();

_supabase.auth.onAuthStateChange(async (event, session) => {
  if(session&&session.user){
    const user=session.user;
    const {data:profile}=await _supabase.from('profiles').select('*').eq('id',user.id).single();
    const role = profile?.role || 'member';
    const name = profile?.name || user.email;
    const year = profile?.year || '';
    window.CURRENT_UID  = user.id;
    window.CURRENT_ROLE = role;
    window.CURRENT_YEAR = year || null;
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('nav-reviewer-tab').style.display = role==='reviewer' ? '' : 'none';
    document.getElementById('nav-matrix-tab').style.display = role==='reviewer' ? '' : 'none';

    // MEMBERSを構築
    if(role==='reviewer'){
      const {data:profiles}=await _supabase.from('profiles').select('*').eq('role','member');
      MEMBERS.length=0;
      if(profiles) profiles.forEach(p=>MEMBERS.push({uid:p.id,name:p.name,year:p.year||''}));
    } else {
      MEMBERS.length=0;
      MEMBERS.push({uid:user.id,name,year});
    }

    // 部員ページのプロフィール表示
    const avatarEl=document.querySelector('#page-member .main > div:first-child > div:first-child');
    const nameEl  =document.querySelector('#page-member .main > div:first-child div:nth-child(2) div:first-child');
    const subEl   =document.querySelector('#page-member .main > div:first-child div:nth-child(2) div:last-child');
    if(avatarEl && name) avatarEl.textContent=name[0];
    if(nameEl) nameEl.textContent=name;
    if(subEl)  subEl.textContent=`${year||'?'}年生 ・ ${role==='reviewer'?'確認者':'部員'}`;

    initProgress();
    updateCountdown();
    setInterval(updateCountdown,60000);

    if(role==='reviewer') showPage('reviewer');
    else { renderDomainList(); showPage('member'); }

    await loadFromDB();
    if(role!=='reviewer') renderDomainList();
    updateProgressBar();
    if(role==='reviewer'){ renderMemberList(); renderMatrix(); }
  } else {
    document.getElementById('auth-screen').classList.add('active');
  }
});

// 学年の編集（スチューデントドクター判定に影響するため、変更後にタブ表示を再描画）
async function editYear(){
  const current = window.CURRENT_YEAR || '';
  const input = prompt('学年を入力してください（1〜6の数字）', current);
  if(input===null) return; // キャンセル
  const newYear = parseInt(input);
  if(isNaN(newYear) || newYear<1 || newYear>6){
    alert('学年は1〜6の数字で入力してください。');
    return;
  }
  const uid = window.CURRENT_UID;
  const {error} = await _supabase.from('profiles').update({year:newYear}).eq('id',uid);
  if(error){
    alert('学年の更新に失敗しました。通信環境を確認して再度お試しください。');
    return;
  }
  window.CURRENT_YEAR = newYear;
  const m = MEMBERS.find(x=>x.uid===uid);
  if(m) m.year = newYear;
  const subEl = document.getElementById('profile-year-sub');
  if(subEl) subEl.textContent = `${newYear}年生 ・ ${window.CURRENT_ROLE==='reviewer'?'確認者':'部員'}`;
  renderDomainList();  // 血管穿刺タブの表示/非表示を即時反映
  updateProgressBar();
}

async function savePracticeDateToDB(uid,domainId,si,di,dateVal){
  try {
    await _supabase.from('practice_dates').upsert({
      uid, domain_id:domainId, subject_idx:si, date_idx:di, practice_date:dateVal||null,
      updated_at:new Date().toISOString(),
    },{onConflict:'uid,domain_id,subject_idx,date_idx'});
  } catch(e){ /* テーブル未作成の場合は無視 */ }
}
async function loadFromDB(){
  showToast('データを読み込み中...','loading');
  try {
    const uid=window.CURRENT_UID;
    const role=window.CURRENT_ROLE;

    // ── 確認者モード：画像URL(image_url)は除外して軽量読み込み ──
    // 画像は部員カードをクリックしたときに個別取得する
    let subQ = role==='reviewer'
      ? _supabase.from('submissions').select('uid,domain_id,subject_idx,view_id,status,feedback')
      : _supabase.from('submissions').select('*');

    let semQ=_supabase.from('seminar_attendance').select('*');
    let nmQ =_supabase.from('subject_names').select('*');
    let pdQ =_supabase.from('practice_dates').select('*');
    if(role==='member'){
      subQ=subQ.eq('uid',uid); semQ=semQ.eq('uid',uid);
      nmQ=nmQ.eq('uid',uid);  pdQ=pdQ.eq('uid',uid);
    }
    let pDates=null;
    try { const pdRes=await pdQ; pDates=pdRes.data; } catch(e){ pDates=null; }
    const [subRes,semRes,nmRes]=await Promise.all([subQ,semQ,nmQ]);
    const submissions=subRes.data, seminars=semRes.data, names=nmRes.data;
    if(seminars) seminars.forEach(row=>{
      if(PROGRESS[row.uid]?.[row.domain_id])
        PROGRESS[row.uid][row.domain_id].seminarSelected=row.seminar_idx;
    });
    if(names) names.forEach(row=>{
      if(PROGRESS[row.uid]?.[row.domain_id]?.subjects[row.subject_idx])
        PROGRESS[row.uid][row.domain_id].subjects[row.subject_idx].name=row.name||'';
    });
    if(submissions) submissions.forEach(row=>{
      if(!PROGRESS[row.uid]?.[row.domain_id]) return;
      const subj=PROGRESS[row.uid][row.domain_id].subjects[row.subject_idx];
      if(!subj?.views[row.view_id]) return;
      subj.views[row.view_id].status=row.status;
      subj.views[row.view_id].feedback=row.feedback||'';
      // 確認者モードは image_url を含まないクエリのため undefined のまま（後で個別取得）
      if(row.image_url !== undefined) subj.views[row.view_id].fileDataUrl=row.image_url||null;
    });
    if(pDates) pDates.forEach(row=>{
      const d=DOMAINS.find(x=>x.id===row.domain_id);
      if(!d) return;
      if(d.isSimplePractice){
        const prog=PROGRESS[row.uid]?.[row.domain_id];
        if(!prog) return;
        while(prog.simpleDates.length<=row.date_idx) prog.simpleDates.push("");
        prog.simpleDates[row.date_idx]=row.practice_date||"";
      } else {
        const subj=PROGRESS[row.uid]?.[row.domain_id]?.subjects[row.subject_idx];
        if(subj?.practiceDates){
          while(subj.practiceDates.length<=row.date_idx) subj.practiceDates.push("");
          subj.practiceDates[row.date_idx]=row.practice_date||"";
        }
      }
    });
    hideToast(); showToast('データを読み込みました','success');
  } catch(err){ hideToast(); showToast('読み込みエラー: '+err.message,'error'); }
}

// ================================================================
// 確認者用：特定部員の画像URLだけを個別取得してPROGRESSに反映
// ================================================================
// 一度取得した部員のUIDを記録しておく（2回目以降は再取得しない）
const _imagesLoadedFor = new Set();

async function loadImagesForMember(uid){
  if(_imagesLoadedFor.has(uid)) return; // 既に取得済みならスキップ
  _imagesLoadedFor.add(uid);
  try {
    const {data,error}=await _supabase
      .from('submissions')
      .select('domain_id,subject_idx,view_id,image_url')
      .eq('uid',uid);
    if(error) throw error;
    if(data) data.forEach(row=>{
      if(!PROGRESS[uid]?.[row.domain_id]) return;
      const subj=PROGRESS[uid][row.domain_id].subjects[row.subject_idx];
      if(!subj?.views[row.view_id]) return;
      subj.views[row.view_id].fileDataUrl=row.image_url||null;
    });
  } catch(e){
    // 取得失敗してもクラッシュしない。次回クリック時に再試行できるようSetから除外
    _imagesLoadedFor.delete(uid);
    console.warn('画像取得失敗:',e);
  }
}
